version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cicd_investigator
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://root:password@mysql:3306/cicd_investigator
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8001
    depends_on:
      - backend

volumes:
  mysql_data:
  chroma_data: